{% load static %}
<!-- ... -->

{% for tool in tools %}
<div class="tool">
    {% if tool.cover %}
        <img src="{{ tool.cover.url }}" alt="{{ tool.Name }}" style="width: 100px; height: 100px;">
    {% else %}
        <img src="{% static 'images/default-tool.png' %}" alt="Default" style="width: 100px; height: 100px;">
    {% endif %}
    <h3>{{ tool.Name }}</h3>
    <p>{{ tool.Description|truncatechars:50 }}</p>
</div>
{% endfor %}
